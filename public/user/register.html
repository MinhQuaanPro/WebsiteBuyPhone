<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #e63946 0%, #b5179e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .register-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .register-header {
            background: linear-gradient(135deg, #e63946 0%, #b5179e 100%);
            padding: 30px 20px;
            text-align: center;
            color: white;
        }
        
        .register-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .register-header p {
            opacity: 0.9;
            font-size: 16px;
        }
        
        .register-body {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        
        .form-input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .form-input:focus {
            border-color: #e63946;
            outline: none;
            box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.2);
        }
        
        .password-strength {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 5px;
            overflow: hidden;
        }
        
        .strength-bar {
            height: 100%;
            width: 0%;
            background: #e63946;
            transition: width 0.3s;
        }
        
        .register-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #e63946 0%, #b5179e 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        
        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(230, 57, 70, 0.4);
        }
        
        .register-btn:active {
            transform: translateY(0);
        }
        
        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e0e0e0;
        }
        
        .divider span {
            background: white;
            padding: 0 15px;
            position: relative;
            color: #6c757d;
        }
        
        .terms {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 25px;
            font-size: 14px;
            color: #6c757d;
        }
        
        .terms input {
            margin-top: 5px;
        }
        
        .login-link {
            text-align: center;
            color: #6c757d;
        }
        
        .login-link a {
            color: #e63946;
            font-weight: 600;
            text-decoration: none;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        
        @media (max-width: 480px) {
            .register-container {
                margin: 10px;
            }
            
            .register-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.location.href='index_user.html'">
        <i class="fas fa-arrow-left"></i>
    </button>
    
    <div class="register-container">
        <div class="register-header">
            <h1><i class="fas fa-user-plus"></i> Đăng ký</h1>
            <p>Tạo tài khoản mới để bắt đầu</p>
        </div>
        
        <div class="register-body">
            <div class="error-message" id="error-message">
                Tên đăng nhập đã tồn tại!
            </div>
            
            <div class="success-message" id="success-message">
                Đăng ký thành công! +50 điểm
            </div>
            
            <form id="register-form">
                <div class="form-group">
                    <label for="username" class="form-label">Tên đăng nhập</label>
                    <input type="text" id="username" class="form-input" placeholder="Nhập tên đăng nhập" required>
                </div>
                
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="Nhập địa chỉ email" required>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Mật khẩu</label>
                    <input type="password" id="password" class="form-input" placeholder="Nhập mật khẩu" required>
                    <div class="password-strength">
                        <div class="strength-bar" id="strength-bar"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirm-password" class="form-label">Xác nhận mật khẩu</label>
                    <input type="password" id="confirm-password" class="form-input" placeholder="Xác nhận mật khẩu" required>
                </div>
                
                <div class="terms">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">
                        Tôi đồng ý với <a href="#" style="color: #e63946;">Điều khoản dịch vụ</a> và <a href="#" style="color: #e63946;">Chính sách bảo mật</a> của hệ thống
                    </label>
                </div>
                
                <button type="submit" class="register-btn">
                    <i class="fas fa-user-plus"></i> Đăng ký ngay
                </button>
            </form>
            
            <div class="divider">
                <span>HOẶC ĐĂNG NHẬP BẰNG</span>
            </div>
            
            <div class="social-login" style="display: flex; justify-content: center; gap: 15px; margin-bottom: 25px;">
                <button class="social-btn" style="width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; transition: all 0.3s; border: 2px solid #e0e0e0; background: #3b5998; color: white;">
                    <i class="fab fa-facebook-f"></i>
                </button>
                <button class="social-btn" style="width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; transition: all 0.3s; border: 2px solid #e0e0e0; background: #db4437; color: white;">
                    <i class="fab fa-google"></i>
                </button>
                <button class="social-btn" style="width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; transition: all 0.3s; border: 2px solid #e0e0e0; background: black; color: white;">
                    <i class="fab fa-apple"></i>
                </button>
            </div>
            
            <div class="login-link">
                <p>Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a></p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const registerForm = document.getElementById('register-form');
            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');
            const passwordInput = document.getElementById('password');
            const strengthBar = document.getElementById('strength-bar');
            
            // Kiểm tra độ mạnh mật khẩu
            passwordInput.addEventListener('input', function() {
                const password = passwordInput.value;
                let strength = 0;
                
                if (password.length >= 8) strength += 25;
                if (/[A-Z]/.test(password)) strength += 25;
                if (/[0-9]/.test(password)) strength += 25;
                if (/[^A-Za-z0-9]/.test(password)) strength += 25;
                
                strengthBar.style.width = strength + '%';
                
                if (strength < 50) {
                    strengthBar.style.backgroundColor = '#f44336';
                } else if (strength < 75) {
                    strengthBar.style.backgroundColor = '#ff9800';
                } else {
                    strengthBar.style.backgroundColor = '#4caf50';
                }
            });
            
            // Xử lý đăng ký
            registerForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const username = document.getElementById('username').value.trim();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirm-password').value;
                
                // Kiểm tra xác nhận mật khẩu
                if (password !== confirmPassword) {
                    showError('Mật khẩu không khớp!');
                    return;
                }
                
                // Lấy danh sách người dùng
                let users = JSON.parse(localStorage.getItem("users")) || [];
                
                // Kiểm tra tên đăng nhập tồn tại
                if (users.some(user => user.username === username)) {
                    showError('Tên đăng nhập đã tồn tại!');
                    return;
                }
                
                // Tạo người dùng mới
                const newUser = {
                    username: username,
                    email: email,
                    password: password,
                    points: 50, // Tự động cộng 50 điểm khi đăng ký
                    doneTasks: [1], // Đánh dấu nhiệm vụ đăng ký đã hoàn thành
                   
                };
                
                // Thêm vào danh sách
                users.push(newUser);
                localStorage.setItem("users", JSON.stringify(users));
                
                // Tự động đăng nhập
                localStorage.setItem("currentUser", JSON.stringify(newUser));
                
                // Hiển thị thành công
                showSuccess('Đăng ký thành công! +50 điểm');
                
                // Chuyển đến trang chính sau 2 giây
                setTimeout(() => {
                    window.location.href = 'index_user.html';
                }, 2000);
            });
            
            // Hiển thị lỗi
            function showError(message) {
                errorMessage.textContent = message;
                errorMessage.style.display = 'block';
                successMessage.style.display = 'none';
                
                setTimeout(() => {
                    errorMessage.style.display = 'none';
                }, 3000);
            }
            
            // Hiển thị thành công
            function showSuccess(message) {
                successMessage.textContent = message;
                successMessage.style.display = 'block';
                errorMessage.style.display = 'none';
            }
        });
    </script>
</body>
</html>
