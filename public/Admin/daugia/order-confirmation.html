<!-- /Chucnang/order-confirmation.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎉 Hoàn Tất Đơn Hàng</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f8f9fa;
      color: #212529;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      max-width: 500px;
      width: 100%;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      overflow: hidden;
      padding: 30px;
    }
    .success-icon {
      font-size: 40px;
      color: #2a9d8f;
      margin-bottom: 15px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #264653;
      text-align: center;
      margin-bottom: 20px;
    }
    .product-info, .winner-info {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      text-align: left;
      white-space: pre-line;
    }
    .form-group {
      margin-bottom: 15px;
      text-align: left;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      color: #495057;
      margin-bottom: 6px;
      font-size: 14px;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ced4da;
      border-radius: 8px;
      font-size: 15px;
    }
    .form-group input:focus {
      outline: none;
      border-color: #2a9d8f;
      box-shadow: 0 0 0 3px rgba(42,157,143,0.1);
    }
    .payment-info {
      background: #e8f5e9;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      text-align: left;
    }
    .label {
      font-weight: 600;
      color: #2e7d32;
      margin-bottom: 4px;
    }
    .value {
      font-weight: 500;
      color: #212529;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: #2a9d8f;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn:hover {
      background: #218874;
    }
    .footer-note {
      margin-top: 20px;
      font-size: 13px;
      color: #6c757d;
      text-align: center;
    }
    .error-message {
      color: #c62828;
      font-size: 13px;
      margin-top: 5px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="success-icon">🎉</div>
    <h1>Chúc Mừng Bạn Đã Chiến Thắng!</h1>

    <div class="product-info">
      <div class="label">🎁 Sản phẩm</div>
      <div class="value" id="productName">Đang tải...</div>
    </div>

    <div class="winner-info">
      <div class="label">👤 Thông tin người thắng</div>
      <div class="value" id="winnerInfo">Đang tải...</div>
    </div>

    <div class="payment-info">
      <div class="label">💰 Giá trúng</div>
      <div class="value" id="winningPrice">Đang tải...</div>
    </div>

    <!-- Form nhập địa chỉ & ngày nhận -->
    <div class="form-group">
      <label for="deliveryAddress">🏠 Địa chỉ nhận hàng (bắt buộc)</label>
      <input type="text" id="deliveryAddress" placeholder="Số nhà, Tên đường, Quận/Huyện, Tỉnh/TP" required />
      <div class="error-message" id="addressError">Vui lòng nhập địa chỉ nhận hàng</div>
    </div>

    <div class="form-group">
      <label for="deliveryDate">📅 Ngày nhận hàng mong muốn (từ ngày mai)</label>
      <input type="date" id="deliveryDate" required />
      <div class="error-message" id="dateError">Vui lòng chọn ngày nhận hàng hợp lệ</div>
    </div>

    <button class="btn" onclick="completeOrder()">
      ✅ Xác Nhận & Hoàn Tất Thanh Toán
    </button>

    <div class="footer-note">
      Vui lòng hoàn tất thanh toán trong vòng 24h để nhận hàng.
    </div>
  </div>

  <script>
    const auctionId = new URLSearchParams(window.location.search).get("id");
    const auctions = JSON.parse(localStorage.getItem("auctions")) || [];
    const auction = auctions.find(a => String(a.id) === String(auctionId));

    if (!auction || !auction.highestBidder) {
      document.body.innerHTML = `<div style="text-align:center; padding:40px; max-width:500px; margin:40px auto; font-family:Inter;">
        <h2 style="color:#e76f51;">❌ Không có dữ liệu đơn hàng!</h2>
        <p><a href="DauGia.html" style="color:#2a9d8f; text-decoration:underline;">← Quay lại</a></p>
      </div>`;
    } else {
      document.getElementById("productName").textContent = auction.productName;
      document.getElementById("winnerInfo").textContent = 
        `${auction.highestBidder.name}\nSĐT: ${auction.highestBidder.phone}\nEmail: ${auction.highestBidder.email}`;
      document.getElementById("winningPrice").textContent = `${auction.currentBid.toLocaleString()}đ`;

      // Đặt ngày mặc định là ngày mai
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      const yyyy = tomorrow.getFullYear();
      const mm = String(tomorrow.getMonth() + 1).padStart(2, '0');
      const dd = String(tomorrow.getDate()).padStart(2, '0');
      document.getElementById("deliveryDate").min = `${yyyy}-${mm}-${dd}`;
      document.getElementById("deliveryDate").value = `${yyyy}-${mm}-${dd}`;
    }

    function showError(id, message) {
      const el = document.getElementById(id);
      el.textContent = message;
      el.style.display = "block";
    }

    function hideError(id) {
      document.getElementById(id).style.display = "none";
    }

    function completeOrder() {
      const address = document.getElementById("deliveryAddress").value.trim();
      const date = document.getElementById("deliveryDate").value;

      // Reset lỗi
      hideError("addressError");
      hideError("dateError");

      let hasError = false;

      if (!address) {
        showError("addressError", "Vui lòng nhập địa chỉ nhận hàng");
        hasError = true;
      }

      const today = new Date();
      const selectedDate = new Date(date);
      const minDate = new Date();
      minDate.setDate(today.getDate() + 1);
      if (!date || selectedDate < minDate) {
        showError("dateError", "Ngày nhận phải từ ngày mai trở đi");
        hasError = true;
      }

      if (hasError) return;

      // ✅ Lưu đơn hàng
      let orders = JSON.parse(localStorage.getItem("orders")) || [];
      orders.push({
        id: Date.now(),
        auctionId: auction.id,
        productName: auction.productName,
        winner: auction.highestBidder,
        price: auction.currentBid,
        deliveryAddress: address,
        deliveryDate: date,
        status: "pending_payment",
        createdAt: new Date().toISOString()
      });
      localStorage.setItem("orders", JSON.stringify(orders));

      alert("✅ Đơn hàng đã được xác nhận! Chúng tôi sẽ liên hệ bạn sớm để giao hàng.");
      window.location.href = "DauGia.html";
    }
  </script>
</body>
</html>
