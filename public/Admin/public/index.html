<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #2a9d8f 0%, #1d7462 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            width: 100%;
        }
        
        .login-section {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
            margin-bottom: 40px;
        }
        
        .login-header {
            background: linear-gradient(135deg, #2a9d8f 0%, #1d7462 100%);
            padding: 30px 20px;
            text-align: center;
            color: white;
        }
        
        .login-header h2 {
            font-size: 28px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .login-body {
            padding: 40px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 16px;
        }
        
        .form-input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 18px;
            transition: all 0.3s;
        }
        
        .form-input:focus {
            border-color: #2a9d8f;
            outline: none;
            box-shadow: 0 0 0 3px rgba(42, 157, 143, 0.2);
        }
        
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e63946 0%, #c1121f 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(230, 57, 70, 0.5);
        }
        
        .divider {
            text-align: center;
            margin: 30px 0;
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e0e0e0;
        }
        
        .divider span {
            background: white;
            padding: 0 15px;
            position: relative;
            color: #6c757d;
            font-size: 18px;
            font-weight: 600;
        }
        
        .products-section {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            padding: 30px;
        }
        
        .section-title {
            font-size: 28px;
            color: #2a9d8f;
            margin-bottom: 25px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
        }
        
        .product-card {
            background: #f8f9fa;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
            transition: all 0.3s;
        }
        
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(42, 157, 143, 0.25);
        }
        
        .product-image {
            height: 200px;
            width: 100%;
            background-color: #e6f7ee;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .product-image img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
        
        .product-info {
            padding: 20px;
            text-align: center;
        }
        
        .product-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #212529;
        }
        
        .product-price {
            font-size: 24px;
            font-weight: bold;
            color: #e63946;
            margin-bottom: 15px;
        }
        
        .view-btn {
            padding: 10px 20px;
            background: #2a9d8f;
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin: 0 auto;
            display: block;
        }
        
        .view-btn:hover {
            background: #218874;
            transform: scale(1.05);
        }
        
        .admin-link {
            text-align: center;
            margin-top: 20px;
            color: #6c757d;
        }
        
        .admin-link a {
            color: #e63946;
            font-weight: 600;
            text-decoration: none;
            font-size: 18px;
        }
        
        .admin-link a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
            display: none;
        }
        
        @media (max-width: 768px) {
            .login-body {
                padding: 25px 20px;
            }
            
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
            
            .form-input {
                padding: 12px;
                font-size: 16px;
            }
            
            .login-btn {
                padding: 12px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-section">
            <div class="login-header">
                <h2><i class="fas fa-user-shield"></i> Đăng nhập Admin</h2>
            </div>
            <div class="login-body">
                <div class="error-message" id="error-message">
                    Sai tên đăng nhập hoặc mật khẩu!
                </div>
                <form id="login-form">
                    <div class="form-group">
                        <label for="user" class="form-label">Tên đăng nhập</label>
                        <input type="text" id="user" class="form-input" placeholder="Nhập tên đăng nhập" required>
                    </div>
                    <div class="form-group">
                        <label for="pass" class="form-label">Mật khẩu</label>
                        <input type="password" id="pass" class="form-input" placeholder="Nhập mật khẩu" required>
                    </div>
                    <button type="submit" class="login-btn">
                        <i class="fas fa-sign-in-alt"></i> Đăng nhập
                    </button>
                </form>
                <div class="admin-link">
                    <a href="admin.html">Vào trang quản lý</a> (sau khi đăng nhập thành công)
                </div>
            </div>
        </div>
        
        <div class="divider">
            <span>HOẶC XEM DANH SÁCH SẢN PHẨM</span>
        </div>
        
        <div class="products-section">
            <h2 class="section-title"><i class="fas fa-mobile-alt"></i> Danh sách sản phẩm</h2>
            <div class="products-grid" id="products">
                <!-- Danh sách sản phẩm sẽ được tạo tự động -->
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const loginForm = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');
        const productsGrid = document.getElementById('products');
        
        // Login function
        async function login(e) {
            e.preventDefault();
            
            const username = document.getElementById('user').value.trim();
            const password = document.getElementById('pass').value;
            
            try {
                const res = await fetch("http://localhost:3000/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
    
                const data = await res.json();
    
                if (data.token) {
                    localStorage.setItem("token", data.token);
                    window.location.href = "admin.html";
                } else {
                    showError('Sai tên đăng nhập hoặc mật khẩu!');
                }
            } catch (error) {
                console.error('Lỗi đăng nhập:', error);
                showError('Không thể kết nối đến server!');
            }
        }
        
        // Show error message
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 3000);
        }
        
        // Fetch products for display
        async function fetchProducts() {
            try {
                const res = await fetch("http://localhost:3000/api/products");
                
                if (!res.ok) throw new Error('Không thể lấy danh sách sản phẩm');
                
                const products = await res.json();
                renderProducts(products);
            } catch (error) {
                console.error('Lỗi khi lấy sản phẩm:', error);
                productsGrid.innerHTML = '<p style="text-align: center; padding: 40px; color: #e63946; font-weight: 500;">❌ Không thể kết nối đến server</p>';
            }
        }
        
        // Render products
        function renderProducts(products) {
            productsGrid.innerHTML = '';
            
            if (products.length === 0) {
                productsGrid.innerHTML = '<p style="text-align: center; padding: 40px; color: #6c757d;">Chưa có sản phẩm nào</p>';
                return;
            }
            
            products.slice(0, 8).forEach(product => {
                const productCard = document.createElement('div');
                productCard.className = 'product-card';
                productCard.innerHTML = `
                    <div class="product-image">
                        <img src="${product.image || 'https://via.placeholder.com/150?text=No+Image'}" alt="${product.name}">
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">${product.name}</h3>
                        <div class="product-price">${new Intl.NumberFormat('vi-VN').format(product.price)}đ</div>
                        <button class="view-btn">
                            <i class="fas fa-eye"></i> Xem chi tiết
                        </button>
                    </div>
                `;
                productsGrid.appendChild(productCard);
            });
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loginForm.addEventListener('submit', login);
            fetchProducts();
        });
    </script>
</body>
</html>
