    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }
    body {
        background-color: #f5f5f5;
        padding: 20px;
    }
    .container {
        max-width: 1200px;
        margin: 0 auto;
    }
    .search-header {
        text-align: center;
        margin-bottom: 20px;
        padding: 15px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 20px;
    }
    .product-card {
        background: white;
        border: 1px solid #ddd;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        transition: transform 0.2s;
        cursor: pointer;
    }
    .product-card:hover {
        transform: translateY(-4px);
    }
    .product-image {
        width: 100%;
        height: 200px;
        object-fit: contain;
        background: #f9f9f9;
        padding: 10px;
    }
    .product-info {
        padding: 15px;
    }
    .product-name {
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 8px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .price-wrap {
        display: flex;
        flex-direction: column;
        gap: 2px;
        margin-top: 8px;
    }
    .product-price {
        font-size: 16px;
        font-weight: bold;
        color: #d9534f;
        margin: 0;
    }
    .product-old-price {
        font-size: 14px;
        color: #999;
        text-decoration: line-through;
        margin: 0;
    }
    .product-discount {
        font-size: 14px;
        color: #5cb85c;
        font-weight: bold;
        margin: 0;
    }
    .storage-options {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 8px;
    }
    .storage-btn {
        padding: 4px 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        cursor: pointer;
        background: white;
        font-size: 12px;
        transition: all 0.2s;
    }
    .storage-btn:hover,
    .storage-btn.active {
        background: #007bff;
        color: white;
        border-color: #007bff;
    }
    .no-result {
        grid-column: 1 / -1;
        text-align: center;
        padding: 40px;
        color: #999;
        font-size: 18px;
    }
    .back-home {
        display: inline-block;
        margin-bottom: 15px;
        padding: 8px 16px;
        background: #007bff;
        color: white;
        border-radius: 6px;
        text-decoration: none;
        font-weight: bold;
    }
    .back-home:hover {
        background: #0056b3;
    }
    .view-more {
        display: block;
        width: 100%;
        padding: 12px;
        background: #f0f0f0;
        border: 1px solid #ddd;
        border-radius: 6px;
        text-align: center;
        color: #007bff;
        font-weight: bold;
        text-decoration: none;
        margin: 30px 0;
        transition: background 0.2s;
    }
    .view-more:hover {
        background: #e0e0e0;
    }

    .product-card {
    text-decoration: none;
    color: inherit;
}

/* Bỏ gạch dưới riêng tên sản phẩm (an toàn hơn) */

      text-decoration: none;
  }

  a {
      text-decoration: none;

</style>

        let currentIndex = 0;
        const batchSize = 8;
        function createProductCard(product) {
            let storageHtml = '';
            if (product.storage) {
                product.storage.forEach((opt, idx) => {
                    storageHtml += `<button class="storage-btn ${idx === 0 ? 'active' : ''}">${opt}</button>`;
                });
            }

            return `
                <a href="${product.url}" class="product-card">
                    <img src="${product.image}" alt="${product.name}" class="product-image">
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        <div class="price-wrap">
                            <div class="product-price">${product.price}</div>
                            ${product.oldPrice ? `<div class="product-old-price">${product.oldPrice}</div>` : ''}
                            ${product.discount ? `<div class="product-discount">${product.discount}</div>` : ''}
                        </div>
                        ${storageHtml ? `<div class="storage-options">${storageHtml}</div>` : ''}
                    </div>
                </a>
            `;
        }
        function loadProducts() {
            const grid = document.getElementById('productsGrid');
            const viewMoreBtn = document.getElementById('viewMoreBtn');

            // Lấy từ khóa từ URL
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q') || '';

            // Lọc sản phẩm
            const filtered = allProducts.filter(p =>
                p.name.toLowerCase().includes(query.toLowerCase())
            );

            // Hiển thị 8 sản phẩm đầu tiên
            const endIndex = Math.min(currentIndex + batchSize, filtered.length);
            const productsToShow = filtered.slice(0, endIndex);

            // Render sản phẩm
            if (productsToShow.length === 0) {
                grid.innerHTML = '<div class="no-result">Không tìm thấy sản phẩm phù hợp.</div>';
                viewMoreBtn.style.display = 'none';
                return;
            }

            grid.innerHTML = productsToShow.map(createProductCard).join('');

            // Cập nhật nút "Xem thêm"
            if (endIndex >= filtered.length) {
                viewMoreBtn.style.display = 'none';
            } else {
                viewMoreBtn.style.display = 'block';
            }

            // Gắn sự kiện click vào nút "Xem thêm"
            viewMoreBtn.onclick = function(e) {
                e.preventDefault();
                currentIndex = endIndex;
                loadProducts();
            };

            // Gắn sự kiện click vào nút dung lượng
            document.querySelectorAll('.storage-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation(); // Ngăn chặn chuyển trang khi click nút dung lượng
                    const group = e.target.closest('.storage-options');
                    group.querySelectorAll('.storage-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                });
            });
        }

        // LẤY TỪ KHÓA TỪ URL VÀ HIỂN THỊ KẾT QUẢ
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('q') || '';

            if (!query) {
                document.getElementById('keyword').textContent = '...';
                document.getElementById('productsGrid').innerHTML = '<div class="no-result">Không có từ khóa tìm kiếm.</div>';
                document.getElementById('viewMoreBtn').style.display = 'none';
                return;
            }

            document.getElementById('keyword').textContent = `"${query}"`;
            currentIndex = 0; // Reset chỉ số khi đổi từ khóa
            loadProducts();
        });
