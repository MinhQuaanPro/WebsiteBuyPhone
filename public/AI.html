<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chat AI giới thiệu sản phẩm</title>
<style>
:root {
  --bg: #0f1724;
  --card: #0b1220;
  --accent: #06b6d4;
  --muted: #94a3b8;
  --glass: rgba(255,255,255,0.03);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Inter", system-ui, sans-serif;
  background: linear-gradient(180deg,#071024 0%, #071729 100%);
  color: #e6eef6;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
}
.wrap {
  width: 100%;
  max-width: 1100px;
  background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
  border-radius: 12px;
  padding: 12px;
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: 12px;
  box-shadow: 0 8px 30px rgba(2,6,23,0.7);
}
.panel {
  background: var(--card);
  border-radius: 10px;
  padding: 12px;
}
h1 {
  font-size: 18px;
  margin: 0 0 8px;
}
label {
  display: block;
  font-size: 14px;
  color: var(--muted);
  margin-top: 8px;
}
input, select {
  width: 100%;
  padding: 10px 12px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.06);
  background: transparent;
  color: inherit;
  font-size: 15px;
}
.btn {
  display: inline-block;
  padding: 10px 14px;
  border-radius: 8px;
  border: 0;
  background: var(--accent);
  color: #012;
  cursor: pointer;
  font-weight: 600;
  font-size: 15px;
}
.btn:active { transform: scale(0.97); }
.small { font-size: 13px; color: var(--muted); }
.chat {
  display: flex;
  flex-direction: column;
  height: 78vh;
}
.chat-window {
  flex: 1;
  overflow: auto;
  padding: 12px;
  border-radius: 8px;
  background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.00));
}
.msg {
  max-width: 90%;
  padding: 10px 12px;
  border-radius: 10px;
  margin: 8px 0;
  line-height: 1.45;
  word-wrap: break-word;
  white-space: pre-line; 
}

.user { align-self: flex-end; background: linear-gradient(90deg,#1f2937,#111827); color: #e6eef6; }
.bot { align-self: flex-start; background: linear-gradient(90deg,#062b3a,#063248); color: #e6f9ff; }
.controls { display: flex; gap: 8px; margin-top: 10px; }
.actions { display: flex; gap: 8px; align-items: center; }
.meta {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: 10px;
  color: var(--muted);
  font-size: 13px;
  flex-wrap: wrap;
}
.pill { background: var(--glass); padding: 6px 8px; border-radius: 999px; font-size: 13px; }
footer { margin-top: 10px; color: var(--muted); font-size: 13px; }
.preset-list { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
.preset { background: rgba(255,255,255,0.03); padding: 6px 8px; border-radius: 8px; cursor: pointer; }
.top-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
.hint { font-size: 12px; color: var(--muted); margin-top: 6px; }

@media (max-width: 900px) {
  .wrap { grid-template-columns: 1fr; }
  .chat { height: auto; min-height: 65vh; }
  .controls { flex-direction: column; }
  .controls input { width: 100%; }
  .controls button { width: 100%; }
  .btn { width: 100%; text-align: center; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <div class="top-row">
      <h1>AI Chat — Giới thiệu & So sánh</h1>
      <div class="pill">Offline / Mobile</div>
    </div>

    <label>Tên sản phẩm</label>
    <input id="name" value=" " />

    <label>Danh mục / Loại</label>
    <input id="category" value=" " />


    <label>Giá</label>
    <input id="price" value=" " />

    <label>Phong cách giới thiệu</label>
    <select id="tone">
      <option value="friendly">Thân thiện</option>
      <option value="professional">Chuyên nghiệp</option>
      <option value="luxury">Sang trọng</option>
      <option value="fun">Năng động</option>
    </select>

    <label>Khách hàng mục tiêu</label>
    <input id="audience" value="" />

    <div class="meta">
      <div class="small">Mẫu nhanh:</div>
      <div class="preset-list">
        <div class="preset" data-pres="fast">Ngắn</div>
        <div class="preset" data-pres="detail">Chi tiết</div>
        <div class="preset" data-pres="social">Mạng xã hội</div>
        <div class="preset" data-pres="email">Email bán hàng</div>
      </div>
    </div>

    <div style="margin-top:12px;display:flex;flex-direction:column;gap:8px;">
      <button class="btn" id="generate">Tạo lời giới thiệu</button>
      <button class="btn" id="compare" style="background:#1e293b;color:var(--accent);border:1px solid rgba(255,255,255,0.04)">So sánh 2 sản phẩm</button>
      <button class="btn" id="clear" style="background:transparent;color:var(--accent);border:1px solid rgba(255,255,255,0.04)">Xoá chat</button>
      
      <a href="index.html"
        class="btn"
        style="background:#0f5bd6;color:var(--accent);border:1px solid rgba(255,255,255,0.04);text-align:center;">
        Trở về danh sách
      </a>
    </div>

    <div class="hint">Hoạt động offline — chạy tốt trên điện thoại.</div>
  </div>

  <div class="panel chat">
    <div class="top-row" style="margin-bottom:8px">
      <h1>Hộp Chat</h1>
      <div class="actions">
        <button class="btn" id="copyAll">Copy</button>
        <button class="btn" id="exportTxt" style="background:transparent;color:var(--accent);border:1px solid rgba(255,255,255,0.04)">Xuất .txt</button>
      </div>
    </div>

    <div id="chatWindow" class="chat-window" aria-live="polite"></div>

    <div class="controls">
      <input id="userInput" placeholder="Nhập câu hỏi hoặc chỉnh sửa..." />
      <button class="btn" id="send">Gửi</button>
      <button class="btn" id="regen">Tạo lại</button>
    </div>
  </div>
</div>

function detectBrand(name) {
  const lower = name.toLowerCase();
  const brands = {
    apple: ["iphone", "apple"],
    samsung: ["galaxy", "samsung"],
    oppo: ["oppo"],
    xiaomi: ["xiaomi", "mi", "redmi", "poco"],
    huawei: ["huawei"],
    vivo: ["vivo"],
    realme: ["realme"],
    nokia: ["nokia"],
    sony: ["sony", "xperia"],
    asus: ["asus", "rog phone", "zenfone"],
    google: ["google", "pixel"],
    oneplus: ["oneplus"],
    motorola: ["motorola", "moto"],
    infinix: ["infinix"],
    tecno: ["tecno"],
    lenovo: ["lenovo"],
    meizu: ["meizu"],
    zte: ["zte", "nubia", "red magic"],
    honor: ["honor"],
    htc: ["htc"]
  };
  for (const [brand, keywords] of Object.entries(brands)) {
    if (keywords.some(k => lower.includes(k))) {
      return brand;
    }
  }
  return "generic";
}

function getCurrentProductData() {
  const name = document.getElementById("name").value.trim();
  
  //màu đt
  const normalizedName = Object.keys(PHONE_DATABASE).find(
  key => key.toLowerCase() === name.toLowerCase()
  );

const db = normalizedName ? PHONE_DATABASE[normalizedName] : {};


  const category = document.getElementById("category").value.trim() || db.category || "Điện thoại thông minh";
  const price = document.getElementById("price").value.trim() || db.price || "";
  const tone = document.getElementById("tone").value;
  const audience = document.getElementById("audience").value.trim() || db.audience || "Người dùng phổ thông";
  const brand = detectBrand(name);
  const features = db.features || [];
  const colors = db.colors || [];
  return { name, category, features, price, tone, audience, brand, colors };

}

function createIntro(preset="detail", product = null) {
  if (!product) product = getCurrentProductData();
  const { name, category, features, price, tone, audience, brand } = product;

  let style = "";
  if (tone === "friendly") style = "Viết thân thiện, gần gũi.";
  if (tone === "professional") style = "Ngôn ngữ chuyên nghiệp, bán hàng.";
  if (tone === "luxury") style = "Ngôn ngữ sang trọng, tinh tế.";
  if (tone === "fun") style = "Ngôn ngữ năng động, vui tươi.";

  let emoji = "📱";
  if (brand === "apple") emoji = "🍎";
  else if (brand === "samsung") emoji = "🌌";

  let intro = "";
  if (preset === "fast") {
    intro = `${name} — lựa chọn hoàn hảo cho ${audience}.`;
  } else if (preset === "detail") {
    intro = `${emoji} ${name} — ${category} dành cho ${audience}.  
${features.map(f=>"• "+f).join("\n")}${price?`\n💰 Giá: ${price}`:""}`;
  } else if (preset === "social") {
    intro = `${emoji} ${name} đã có mặt!  
${features[0] || "Hiệu năng đỉnh cao."}  
${price?`Chỉ ${price}`:""} — phù hợp cho ${audience}! #${category.replace(/\s+/g,"")}`;
  } else if (preset === "email") {
    intro = `Xin chào! 👋  
Bạn đang tìm ${category.toLowerCase()} phù hợp với ${audience}?  
Hãy xem ${name}:  
${features.slice(0,3).map(f=>"- "+f).join("\n")}  
${price?`Giá chỉ ${price}.`:""}  
Liên hệ ngay để biết thêm chi tiết!`;
  }

  return intro + `\n\n(${style})`;
}

function isValidPhoneName(name) {
  if (!name) return false;
  const lower = name.toLowerCase();
  return VALID_PHONES.some(valid =>
    valid.toLowerCase().includes(lower) || lower.includes(valid.toLowerCase())
  );
}

const suggestions = suggestChoice(a, b);

if (suggestions.length > 0) {

  return lines.join("\n");

function suggestChoice(a, b) {
  const suggest = [];

  // 💰 So sánh giá
  if (a.price && b.price) {
    const priceA = parseInt(a.price.replace(/\D/g, ""));
    const priceB = parseInt(b.price.replace(/\D/g, ""));
    if (priceA < priceB) {
      suggest.push(`💰 **${a.name}** rẻ hơn, phù hợp nếu bạn muốn tiết kiệm chi phí.`);
    } else if (priceB < priceA) {
      suggest.push(`💰 **${b.name}** rẻ hơn, phù hợp nếu bạn muốn tiết kiệm chi phí.`);
    }
  }

  // 📸 Camera
  if (a.features.join().toLowerCase().includes("camera") &&
      !b.features.join().toLowerCase().includes("camera")) {
    suggest.push(`📸 **${a.name}** phù hợp hơn nếu bạn ưu tiên chụp ảnh/quay video.`);
  }

  if (b.features.join().toLowerCase().includes("camera") &&
      !a.features.join().toLowerCase().includes("camera")) {
    suggest.push(`📸 **${b.name}** phù hợp hơn nếu bạn ưu tiên chụp ảnh/quay video.`);
  }

  // 🔋 Pin
  if (a.features.join().toLowerCase().includes("pin")) {
    suggest.push(`🔋 **${a.name}** phù hợp với người cần pin trâu.`);
  }
  if (b.features.join().toLowerCase().includes("pin")) {
    suggest.push(`🔋 **${b.name}** phù hợp với người cần pin trâu.`);
  }

  // 📱 Gập
  if (a.name.toLowerCase().includes("fold")) {
    suggest.push(`📱 **${a.name}** phù hợp cho đa nhiệm, làm việc nhiều ứng dụng.`);
  }
  if (b.name.toLowerCase().includes("fold")) {
    suggest.push(`📱 **${b.name}** phù hợp cho đa nhiệm, làm việc nhiều ứng dụng.`);
  }

  // 🍎 Hệ sinh thái Apple
  if (a.brand === "apple") {
    suggest.push(`🍎 **${a.name}** phù hợp nếu bạn dùng iPhone/iPad/Mac và thích hệ sinh thái Apple.`);
  }
  if (b.brand === "apple") {
    suggest.push(`🍎 **${b.name}** phù hợp nếu bạn dùng iPhone/iPad/Mac và thích hệ sinh thái Apple.`);
  }

  // 🤖 Android tuỳ biến
  if (a.brand === "samsung" || a.brand === "google") {
    suggest.push(`🤖 **${a.name}** phù hợp nếu bạn thích Android và khả năng tuỳ biến.`);
  }
  if (b.brand === "samsung" || b.brand === "google") {
    suggest.push(`🤖 **${b.name}** phù hợp nếu bạn thích Android và khả năng tuỳ biến.`);
  }

  return suggest;
}

    qLower.includes("có màu gì")
  ) {
    if (colors && colors.length > 0) {
      return `🎨 ${name} hiện có các màu: ${colors.join(", ")}.`;

      return `⚠️ Hiện mình chưa có thông tin màu sắc cho ${name}.`;
